name: build

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet restore MagicAiGateway.sln
      - run: dotnet build MagicAiGateway.sln --configuration Release --no-restore
      - run: dotnet test SharedMagic.Tests/SharedMagic.Tests.csproj --configuration Release --no-build
