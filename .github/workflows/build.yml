name: build

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet restore MagicAiGateway.sln
      - name: Build
        shell: bash
        run: |
          dotnet build MagicAiGateway.sln --configuration Release --no-restore > build.log 2>&1
          status=$?
          cat build.log
          exit $status
      - name: Publish NativeAOT MCP package template
        run: >-
          dotnet publish
          MagicAiGateway.MCP.Package.Template/MagicAiGateway.MCP.Package.Template.csproj
          --configuration Release
          --runtime linux-x64
          --self-contained true
          --output artifacts/mcp-package-template
      - name: Verify native MCP ABI exports
        shell: bash
        run: |
          find artifacts/mcp-package-template -maxdepth 1 -type f -printf '%f\n' | sort
          library="artifacts/mcp-package-template/MagicAiGateway.MCP.Package.Template.so"
          test -f "$library"
          file "$library"
          nm -D --defined-only "$library" |
            awk '{ name = $NF; sub(/@@.*/, "", name); print name }' |
            sort -u > native-exports.txt
          cat native-exports.txt
          for symbol in \
            magic_mcp_get_abi_version \
            magic_mcp_get_manifest \
            magic_mcp_start_instance \
            magic_mcp_send \
            magic_mcp_receive \
            magic_mcp_stop_instance \
            magic_mcp_list_instances \
            magic_mcp_shutdown \
            magic_mcp_get_last_error
          do
            grep -Fx "$symbol" native-exports.txt
          done
      - name: Smoke test native MCP package
        run: >-
          python3 scripts/verify_mcp_package.py
          artifacts/mcp-package-template/MagicAiGateway.MCP.Package.Template.so
      - name: Upload NativeAOT diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nativeaot-diagnostics
          path: |
            artifacts/mcp-package-template
            native-exports.txt
          if-no-files-found: ignore
      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
      - run: dotnet test SharedMagic.Tests/SharedMagic.Tests.csproj --configuration Release --no-build
      - name: Client unit and integration tests
        run: >-
          dotnet test MagicAiGateway.Client.Tests/MagicAiGateway.Client.Tests.csproj
          --configuration Release
          --no-build
          --filter "Category!=Live"
      - name: Pack protocol contracts
        run: dotnet pack MagicAiGateway.Protocol/MagicAiGateway.Protocol.csproj --configuration Release --no-build --output artifacts
      - name: Pack client SDK
        run: dotnet pack MagicAiGateway.Client/MagicAiGateway.Client.csproj --configuration Release --no-build --output artifacts
      - name: Pack MCP package framework
        run: dotnet pack MagicAiGateway.MCP.Package/MagicAiGateway.MCP.Package.csproj --configuration Release --no-build --output artifacts
      - name: Verify MCP package NuGet contents
        shell: bash
        run: |
          package="$(find artifacts -maxdepth 1 -type f -name 'MagicAiGateway.MCP.Package.*.nupkg' ! -name '*.symbols.nupkg' -print -quit)"
          test -n "$package"
          unzip -l "$package" > mcp-package-contents.txt
          cat mcp-package-contents.txt
          grep -F 'README.md' mcp-package-contents.txt
          grep -F 'analyzers/dotnet/cs/MagicAiGateway.MCP.Package.Generators.dll' mcp-package-contents.txt
