name: build

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet restore MagicAiGateway.sln
      - name: Build
        shell: bash
        run: |
          if ! dotnet build MagicAiGateway.sln --configuration Release --no-restore > build.log 2>&1; then
            grep -E "error (CS|NU|NETSDK)|Build FAILED|[0-9]+ Error\(s\)" build.log || cat build.log
            exit 1
          fi
          cat build.log
      - run: dotnet test SharedMagic.Tests/SharedMagic.Tests.csproj --configuration Release --no-build
